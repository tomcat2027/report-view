server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # 静态文件
    location /index.html {
        try_files $uri =404;
    }

    # 目录列表
    location / {
        autoindex on;
        autoindex_exact_size off;
        autoindex_localtime on;
    }
}
