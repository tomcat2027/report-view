server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # 开启目录列表
    location / {
        autoindex on;
        try_files $uri $uri/ =404;
    }

    # 安全隐藏目录列表中的详细信息
    location /data_reports/ { autoindex_exact_size off; }
    location /research_reports/ { autoindex_exact_size off; }
}
